<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="main">
        <div class="main_box">
            <div id="calendar_box">
                <div class="header">
                    <button id="prevBtn">Prev</button>
                    <h2 id="monthDisplay"></h2>
                    <button id="nextBtn">Next</button>
                </div>
                <div class="weekdays">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>
                <div class="days" id="daysContainer"></div>
            </div>
        </div>
    </div>
    <div class="taskbar-box">
        <div class="taskbar">
            <div class="apps">
                <button onclick="calender()" style="background: none; border: none; cursor: pointer;">
                    <img class="calendar" src="Assests/calendar.png" alt="" width="60">
                    <div class="calendar_dot dot"></div>
                </button>

                <button onclick="To_do()" style="background: none; border: none; cursor: pointer;">
                    <img class="To_do" src="Assests/To_do.png" alt="" width="50">
                    <div class="To_do_dot dot"></div>
                </button>

                <button onclick="clock()" style="background: none; border: none; cursor: pointer;"><img class="clock"
                        src="Assests/clock.png" alt="" width="50">
                        <div class="clock_dot dot"></div>
                </button>

                <button onclick="note()" style="background: none; border: none; cursor: pointer;"><img class="To_do"
                        src="Assests/note.png" alt="" width="50">
                        <div class="note_dot dot"></div>
                </button>

                <button onclick="img_converter()" style="background: none; border: none; cursor: pointer;"><img class="To_do"
                        src="Assests/img_converter.png" alt="" width="60">
                        <div class="img_converter_dot dot"></div>
                </button>

                <button onclick="net_speed_test()" style="background: none; border: none; cursor: pointer;"><img class="To_do"
                        src="Assests/net_speed_test.png" alt="" width="50">
                        <div class="net_speed_test_dot dot"></div>
                </button>

                <button onclick="password_strenght_checker()" style="background: none; border: none; cursor: pointer;"><img class="To_do"
                        src="Assests/password_strenght_checker.png" alt="" width="45">
                        <div class="password_strenght_checker_dot dot"></div>
                </button>

                <button onclick="timezone()" style="background: none; border: none; cursor: pointer;"><img class="To_do"
                        src="Assests/timezone.png" alt="" width="50">
                        <div class="timezone_dot dot"></div>
                </button>
            </div>
        </div>
    </div>

</body>

</html>
